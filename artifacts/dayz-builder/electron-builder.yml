appId: com.danksdayzstudio.editor
productName: Dank's Dayz Studio
copyright: Dank's Dayz Studio

directories:
  output: release
  buildResources: build-resources

# Files to include in the package
files:
  - dist/public/**
  - electron/dist/**
  - package.json

# Entry point for the main process
extraMetadata:
  main: electron/dist/main.js

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build-resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Dank's Dayz Studio

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build-resources/icon.icns
  category: public.app-category.utilities

dmg:
  title: Dank's Dayz Studio
  background: null
  window:
    width: 540
    height: 380

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build-resources/icon.png
  category: Utility
  description: Dank's Dayz Studio — DayZ server tools, base builder and structure generator

# ── Auto-update (GitHub Releases) ────────────────────────────────────────────
publish:
  provider: github
  owner: danksdayzstudio
  repo: danksdayzstudio
  releaseType: release
